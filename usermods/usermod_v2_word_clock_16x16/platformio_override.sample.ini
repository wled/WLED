# ------------------------------------------------------------------------------
# Sample platformio_override.ini for usermod_v2_word_clock_16x16
# Version 1.0.0  ·  Updated 2026-06-27  ·  Austin St. Aubin <austinsaintaubin@gmail.com>
# ------------------------------------------------------------------------------
# Copy to the repo root as `platformio_override.ini` and adjust to taste.
# It merges on top of platformio.ini. Build the env below:
#   esp32dev_wordclock_16x16        (USB/serial upload)
#   esp32dev_wordclock_16x16_ota    (over-the-air upload)
# ------------------------------------------------------------------------------

[platformio]
default_envs = esp32dev_wordclock_16x16

[env:esp32dev_wordclock_16x16]
extends = env:esp32dev          ; inherits board, platform, partitions, lib_deps

# This usermod. We deliberately do NOT inherit ${env:esp32dev.custom_usermods}
# (which defaults to "audioreactive" + arduinoFFT) — a clock doesn't need it.
custom_usermods = usermod_v2_word_clock_16x16
# Add an I2C OLED display too (optional); needs the I2C pins set below:
# custom_usermods = usermod_v2_word_clock_16x16 four_line_display_ALT

# Build from the same bases esp32dev uses, and set WLED_RELEASE_NAME ourselves
# (avoids the duplicate-define warning from re-including ${env:esp32dev.build_flags}).
build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=0          ; mandatory for "classic" ESP32
  -D WLED_RELEASE_NAME=\"wordclock_16x16_esp32\"

  ; --- SIZE: drop features a word clock never uses (frees flash) ---
  -D WLED_DISABLE_INFRARED             ; drops the large IRremoteESP8266 code
  -D WLED_DISABLE_ESPNOW               ; drops QuickEspNow (no WizMote/sync)
  ; -D WLED_DISABLE_ALEXA
  ; -D WLED_DISABLE_HUESYNC

  ; --- Word clock: force the boot transition time (ms). WLED's live "Transition"
  ; slider otherwise reverts to the saved default on reboot; this re-applies your
  ; value each boot (after cfg load). 1800 = 1.8 s. Comment out to leave WLED's default. ---
  -D WC16_DEFAULT_TRANSITION_MS=1800

  ; --- I2C OLED (only if four_line_display_ALT is enabled above) ---
  ; -D FLD_TYPE=SSD1306_64               ; 0.96" 128x64 = SSD1306; 1.3" = SH1106
  ; -D I2CSDAPIN=5
  ; -D I2CSCLPIN=4
  ; -D HW_PIN_SDA=5                       ; informs the WebUI of the default pins
  ; -D HW_PIN_SCL=4

  ; --- NTP + timezone (the clock needs correct time). DST handled automatically. ---
  -D WLED_NTP_ENABLED=true
  -D WLED_TIMEZONE=5                      ; see WLED tz list; 5 = US Central
  ; Lat/lon set sunrise/sunset AND are the default weather location:
  ; -D WLED_LAT=35.65
  ; -D WLED_LON=-97.48

  ; --- WiFi (OPTIONAL): baking creds in is convenient but extractable from the .bin.
  ; Leave commented to provision via the WLED-AP captive portal instead. ---
  ; -D CLIENT_SSID='"your-ssid"'
  ; -D CLIENT_PASS='"your-password"'

  ; --- OTA security (OPTIONAL): sets the OTA-Lock passphrase AND defaults to OTA-LOCKED.
  ; Only applied to a FRESH/erased config. ---
  ; -D WLED_OTA_PASS=\"CHANGE_ME_strong_pass\"

  ; Compile ArduinoOTA on by default (still blocked while OTA-locked):
  -D WLED_ENABLE_AOTA

  ; --- MORE headroom, only if you add usermods later and overflow flash ---
  ; -D WLED_DISABLE_MQTT               ; ~15-20 KB; WLED still does Home Assistant natively
  ; -D WLED_DISABLE_PARTICLESYSTEM1D   ; 1D particles are useless on a 2D matrix
  ; -D WLED_DISABLE_PARTICLESYSTEM2D   ; keep ON if you want 2D matrix FX

# ------------------------------------------------------------------------------
# OTA (over-the-air) upload variant. Reuses the build above; only upload changes.
# In WLED first: Security & Updates -> untick "OTA Lock", tick "Enable ArduinoOTA",
# Save, reboot. WLED sets no ArduinoOTA password, so no --auth is needed.
# ------------------------------------------------------------------------------
[env:esp32dev_wordclock_16x16_ota]
extends = env:esp32dev_wordclock_16x16
upload_protocol = espota
upload_port = wordclock.local        ; <-- your device's IP or mDNS name
