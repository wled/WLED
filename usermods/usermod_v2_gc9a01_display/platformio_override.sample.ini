; GC9A01 Round Display usermod — sample build configuration
; Copy/rename to platformio_override.ini and adjust pin numbers for your board.
;
; All SPI pins MUST be set at compile time (TFT_eSPI requirement).
; CS / DC / RST / BL can also be changed here freely.
;
; Default pin assignments below are for a generic ESP32 DevKit:
;   MOSI  = GPIO 23   SCLK  = GPIO 18
;   CS    = GPIO 15   DC    = GPIO  2
;   RST   = GPIO  4   BL    = GPIO 32  (set -1 if backlight is always on)

[env:esp32dev_gc9a01]
extends      = env:esp32dev
lib_deps     = ${esp32dev.lib_deps}
  bodmer/TFT_eSPI @ ~2.5.43
build_flags  = ${esp32dev.build_flags}
  ; ---- Enable the usermod ----
  -D USERMOD_GC9A01_DISPLAY

  ; ---- TFT_eSPI configuration ----
  -D USER_SETUP_LOADED=1
  -D USER_SETUP_ID=1
  -D GC9A01_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240

  ; ---- SPI data / clock (shared bus) ----
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_MISO=-1

  ; ---- Display-specific pins ----
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D TFT_BL=32
  -D TFT_BACKLIGHT_ON=HIGH

  ; ---- Font / feature selection ----
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SMOOTH_FONT=1

  ; ---- SPI clock speed ----
  -D SPI_FREQUENCY=40000000
