<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="utf-8">
	<meta content='width=device-width' name='viewport'>
	<title>需要 PIN 码</title>
	<script>
		var d = document;
		function B() { window.open("../settings","_self"); }
	</script>
	<style>
		@import url("style.css");
	</style>
</head>
<body onload="d.getElementsByName('PIN')[0].focus()">
	<form id="form_s" name="Sf" method="post">
	<div class="sec">
		<h2>请输入设置 PIN 码</h2>
		<input type="password" name="PIN" size="4" maxlength="4" minlength="4" pattern="[0-9]*" inputmode="numeric" autofocus>
		<hr>
		<button type="button" onclick="B()">返回</button><button type="submit">提交</button>
	</div>
	</form>
</body>
</html>
