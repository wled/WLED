<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>SVG Arrow Demo</title>
	<style>
		body {
			background: #111;
			color: #fff;
			font-family: Helvetica, Verdana, sans-serif;
			padding: 40px;
			text-align: center;
		}
		h1 { margin-bottom: 40px; }
		.demo-section {
			margin: 40px auto;
			max-width: 400px;
			background: #222;
			padding: 20px;
			border-radius: 20px;
		}
		.demo-section h2 {
			font-size: 16px;
			margin-top: 0;
			color: #aaa;
		}
		.button-group {
			display: flex;
			gap: 10px;
			justify-content: center;
			align-items: center;
			margin: 20px 0;
		}
		button {
			background: transparent;
			border: none;
			cursor: pointer;
			color: #ccc;
			padding: 8px;
			font-size: 20px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: color 0.3s;
		}
		button:hover:not(:disabled) {
			color: #fff;
		}
		button:disabled {
			opacity: 0.3;
			cursor: default;
		}
		svg {
			display: block;
		}
		.label {
			color: #999;
			font-size: 12px;
			margin-top: 10px;
		}
	</style>
</head>
<body>

<h1>SVG Arrow Icons Demo</h1>

<div class="demo-section">
	<h2>Up Arrow</h2>
	<div class="button-group">
		<button title="Move up">
			<svg viewBox="0 0 24 24" width="24" height="24">
				<polygon points="12,6 18,14 6,14" fill="currentColor"/>
			</svg>
		</button>
	</div>
	<div class="label">Solid filled triangle pointing up</div>
</div>

<div class="demo-section">
	<h2>Down Arrow</h2>
	<div class="button-group">
		<button title="Move down">
			<svg viewBox="0 0 24 24" width="24" height="24">
				<polygon points="12,18 18,10 6,10" fill="currentColor"/>
			</svg>
		</button>
	</div>
	<div class="label">Solid filled triangle pointing down</div>
</div>

<div class="demo-section">
	<h2>In Context (like Favorites) - Side by Side</h2>
	<div class="button-group">
		<button title="Move up" style="padding: 4px 2px;">
			<svg viewBox="0 0 24 24" width="20" height="20">
				<polygon points="12,8 18,16 6,16" fill="currentColor"/>
			</svg>
		</button>
		<button title="Move down" style="padding: 4px 2px;">
			<svg viewBox="0 0 24 24" width="20" height="20">
				<polygon points="12,16 18,8 6,8" fill="currentColor"/>
			</svg>
		</button>
		<div style="flex: 1; text-align: left; padding-left: 10px;">
			<div style="background: #2a2a2a; padding: 12px; border-radius: 8px; margin-left: 0;">
				Favorite #1
			</div>
		</div>
	</div>
</div>

<div class="demo-section">
	<h2>Disabled State</h2>
	<div class="button-group">
		<button title="Move up" disabled style="padding: 4px 2px;">
			<svg viewBox="0 0 24 24" width="20" height="20">
				<polygon points="12,6 18,14 6,14" fill="currentColor"/>
			</svg>
		</button>
		<button title="Move down" style="padding: 4px 2px;">
			<svg viewBox="0 0 24 24" width="20" height="20">
				<polygon points="12,18 18,10 6,10" fill="currentColor"/>
			</svg>
		</button>
	</div>
	<div class="label">Up arrow disabled (at top of list)</div>
</div>

</body>
</html>
