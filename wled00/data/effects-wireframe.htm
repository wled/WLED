<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Effects Tab Wireframe</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			width: 100%;
			background: #1a1a1a;
			color: #fff;
			font-family: monospace;
			font-size: 11px;
		}

		body {
			display: flex;
			flex-direction: column;
			position: fixed;
			overflow: hidden;
		}

		/* Top nav */
		.top-nav {
			height: 80px;
			border: 1px solid #0f0;
			display: flex;
			align-items: center;
			padding: 2px;
		}

		.top-nav::before {
			content: ".top-nav (80px)";
			position: absolute;
			top: 2px;
			left: 2px;
			color: #0f0;
			font-size: 10px;
		}

		/* Main content area */
		.content-area {
			flex: 1;
			border: 1px solid #f0f;
			overflow-y: auto;
			overflow-x: hidden;
			padding: 0 4px;
			position: relative;
		}

		.content-area::before {
			content: ".content-area / .tabcontent (scrollable)";
			position: sticky;
			top: 0;
			display: block;
			height: 14px;
			color: #f0f;
			font-size: 10px;
			background: #1a1a1a;
			border-bottom: 1px solid #f0f;
		}

		/* Content container wrapper */
		.content-wrapper {
			width: 100%;
			display: flex;
			justify-content: center;
			padding: 4px 0;
		}

		/* Main content container */
		.content-container {
			width: 280px;
			border: 1px solid #00f;
			padding: 4px;
			position: relative;
		}

		.content-container::before {
			content: "#Effects (280px max-width, margin: 0 - LEFT)";
			position: absolute;
			top: 2px;
			left: 2px;
			color: #00f;
			font-size: 9px;
		}

		/* Search/Filter section */
		.filter-section {
			border: 1px solid #0ff;
			height: 40px;
			margin: 4px 0;
			margin-top: 14px;
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.filter-section::before {
			position: absolute;
			top: 2px;
			left: 2px;
			font-size: 9px;
			color: #0ff;
			content: "#fxFind (hidden per REQ 3.12)";
		}

		/* Effects list container */
		.effects-list-container {
			border: 1px solid #0ff;
			position: relative;
			margin-top: 4px;
		}

		.effects-list-container::before {
			position: absolute;
			top: 2px;
			left: 2px;
			font-size: 9px;
			color: #0ff;
			content: "#fxlist (effects list)";
			z-index: 1;
		}

		/* Individual effect pill row */
		.effect-pill-row {
			border: 1px solid #0cc;
			height: 50px;
			margin: 4px 0;
			margin-top: 14px;
			position: relative;
			display: flex;
			align-items: center;
			padding: 0 4px;
		}

		.effect-pill-row:first-child {
			margin-top: 18px;
		}

		.effect-pill-row::before {
			position: absolute;
			top: 2px;
			left: 2px;
			font-size: 8px;
			color: #0cc;
			content: ".fx-pill-row";
		}

		/* Pill content */
		.effect-pill {
			flex: 1;
			border: 1px dashed #0cc;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 4px;
		}

		.effect-pill::before {
			content: ".lstI (pill)";
			font-size: 8px;
			color: #0cc;
		}

		/* Heart icon */
		.heart-icon {
			border: 1px dashed #0cc;
			width: 28px;
			height: 28px;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.heart-icon::before {
			content: "♡";
			font-size: 12px;
			color: #0cc;
		}

		/* Sticky slider section */
		.sticky-section {
			border: 1px solid #ff0;
			height: 60px;
			margin: 4px 0;
			position: sticky;
			bottom: 63px;
			z-index: 2;
			background: #1a1a1a;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.sticky-section::before {
			position: absolute;
			top: 2px;
			left: 2px;
			font-size: 9px;
			color: #ff0;
			content: "#sliders (Brightness - STICKY)";
		}

		/* Info panel */
		.info-panel {
			border: 1px dashed #f00;
			height: 50px;
			margin: 10px auto 20px auto;
			max-width: 280px;
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.info-panel::before {
			position: absolute;
			top: 2px;
			left: 2px;
			font-size: 9px;
			color: #f00;
			content: "#fxInfoPanel (280px max-width, margin: 10px auto - CENTERED)";
		}

		/* Bottom nav */
		.bottom-nav {
			height: 63px;
			border: 1px solid #0f0;
			position: relative;
		}

		.bottom-nav::before {
			content: ".bottom-nav (63px)";
			position: absolute;
			top: 2px;
			left: 2px;
			color: #0f0;
			font-size: 10px;
		}

		/* Legend */
		.legend {
			position: fixed;
			bottom: 65px;
			right: 2px;
			background: #222;
			border: 1px solid #555;
			padding: 4px;
			font-size: 9px;
			color: #888;
			z-index: 10;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 4px;
			margin: 2px 0;
		}

		.legend-color {
			width: 12px;
			height: 10px;
			border: 1px solid currentColor;
		}

		/* Scrollbar */
		::-webkit-scrollbar {
			width: 6px;
		}

		::-webkit-scrollbar-thumb {
			background: #444;
		}
	</style>
</head>
<body>

<div class="top-nav"></div>

<div class="content-area">
	<div class="content-wrapper">
		<div class="content-container">
			<div class="filter-section"></div>

			<div class="effects-list-container">
				<div class="effect-pill-row">
					<div class="effect-pill"></div>
					<div class="heart-icon"></div>
				</div>
				<div class="effect-pill-row">
					<div class="effect-pill"></div>
					<div class="heart-icon"></div>
				</div>
				<div class="effect-pill-row">
					<div class="effect-pill"></div>
					<div class="heart-icon"></div>
				</div>
				<div class="effect-pill-row">
					<div class="effect-pill"></div>
					<div class="heart-icon"></div>
				</div>
				<div class="effect-pill-row">
					<div class="effect-pill"></div>
					<div class="heart-icon"></div>
				</div>
			</div>

			<div class="sticky-section"></div>
			<div class="info-panel"></div>
		</div>
	</div>
</div>

<div class="bottom-nav"></div>

<div class="legend">
	<div class="legend-item"><div class="legend-color" style="border-color: #0f0;"></div> Nav (80px / 63px)</div>
	<div class="legend-item"><div class="legend-color" style="border-color: #f0f;"></div> Scrollable area</div>
	<div class="legend-item"><div class="legend-color" style="border-color: #00f;"></div> #Effects (280px)</div>
	<div class="legend-item"><div class="legend-color" style="border-color: #0ff;"></div> Search & pills</div>
	<div class="legend-item"><div class="legend-color" style="border-color: #ff0;"></div> #sliders (sticky)</div>
	<div class="legend-item"><div class="legend-color" style="border-color: #f00;"></div> Info panel (centered)</div>
</div>

</body>
</html>
