<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
	<title>WLED 设置</title>
	<script>
		// load common.js with retry on error
		(function loadFiles() {
			const l = document.createElement('script');
			l.src = 'common.js';
			// note: loading style.css here causes ugly white button flashes so @import url("style.css") below inlines it for this page (only costs ~30bytes of flash)
			l.onload = () => {
				getLoc();
				loadJS(getURL('/settings/s.js?p=0'), false);
			};
			l.onerror = () => setTimeout(loadFiles, 100);
			document.head.appendChild(l);
		})();
	</script>
	<style>
		@import url("style.css");
		body {
			height: 100px;
			margin: 0 auto;
			max-width: 520px;
		}
		html {
			--h: 9vh;
		}
		button {
			display: block;
			border-radius: var(--h);
			font-size: clamp(1rem, 6vw, 2rem);
			height: var(--h);
			width: calc(100% - 40px);
			margin: 2vh auto 0;
			padding: 0;
		}
	</style>
</head>
<body>
<button type=submit id="b" onclick="window.location=getURL('/')">返回</button>
<button type="submit" onclick="window.location=getURL('/settings/wifi')">WiFi 和网络</button>
<button type="submit" onclick="window.location=getURL('/settings/leds')">LED 和硬件</button>
<button type="submit" onclick="window.location=getURL('/settings/pins')">引脚信息</button>
<button id="2dbtn" type="submit" onclick="window.location=getURL('/settings/2D')">2D 配置</button>
<button type="submit" onclick="window.location=getURL('/settings/ui')">用户界面</button>
<button id="dmxbtn" style="display:none;" type="submit" onclick="window.location=getURL('/settings/dmx')">DMX 输出</button>
<button type="submit" onclick="window.location=getURL('/settings/sync')">同步接口</button>
<button type="submit" onclick="window.location=getURL('/settings/time')">时间和宏</button>
<button type="submit" onclick="window.location=getURL('/settings/um')">用户模块</button>
<button type="submit" onclick="window.location=getURL('/settings/sec')">安全和更新</button>
</body>
</html>
