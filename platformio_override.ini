[platformio]
default_envs = esp32c6_zigbee 
  esp32c5_zigbee

[env:esp32c6_zigbee]
extends = env:esp32c6dev_8MB
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip ;; use pioarduino - tasmota platform has no zigbee support
platform_packages =
board_build.partitions = tools/WLED_ESP32_8MB_Zigbee.csv
custom_usermods = zigbee_rgb_light
build_unflags = ${env:esp32c6dev_8MB.build_unflags}
  -D WLED_RELEASE_NAME=\"ESP32-C6_8MB\"
  -D CORE_DEBUG_LEVEL=0
build_flags = ${env:esp32c6dev_8MB.build_flags}
               -D WLED_RELEASE_NAME=\"ESP32C6_Zigbee\"
               -DZIGBEE_MODE_ED=1
               -DUSERMOD_ZIGBEE_RGB_LIGHT
               -DWLED_DEBUG
               ; Enable IDF log output so ESP_LOGI/ESP_LOGE from the Zigbee stack
               ; and the coexistence call are visible on the serial console.
               -DCORE_DEBUG_LEVEL=3
               ; Disable RMT-based digital LED buses: the Zigbee 802.15.4 radio on C6
               ; shares the RMT peripheral, causing rmt_tx_wait_all_done() timeout spam.
               ; With WLED_MAX_DIGITAL_CHANNELS=0, no RMT/I2S bus slots are created.
               ; Use analog (PWM/LEDC) outputs or a separate SPI LED controller instead.
               -DWLED_MAX_DIGITAL_CHANNELS=0

; Flash partition table + otadata reset alongside firmware to avoid
; stale otadata (from a prior large_partitions build) causing
; bootloader assert: rom_index < 2
;;board_build.flash_extra_images =
;;  0x8000  ${BUILD_DIR}/partitions.bin
;;  0xe000  ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin


[env:esp32c5_zigbee]
extends = env:esp32c5dev_8MB_qspi
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip ;; use pioarduino - tasmota platform has no zigbee support
platform_packages =
board_build.partitions = tools/WLED_ESP32_8MB_Zigbee.csv
custom_usermods = zigbee_rgb_light
build_unflags = ${env:esp32c5dev_8MB_qspi.build_unflags}
  -D WLED_RELEASE_NAME=\"ESP32-C5_8MB_qspi\"
  -D CORE_DEBUG_LEVEL=0
build_flags = ${env:esp32c5dev_8MB_qspi.build_flags}
               -D WLED_RELEASE_NAME=\"ESP32C5_Zigbee\"
               -DZIGBEE_MODE_ED=1
               -DUSERMOD_ZIGBEE_RGB_LIGHT
               -DWLED_DEBUG
               ; Enable IDF log output so ESP_LOGI/ESP_LOGE from the Zigbee stack
               ; and the coexistence call are visible on the serial console.
               -DCORE_DEBUG_LEVEL=3
               ; Disable RMT-based digital LED buses: the Zigbee 802.15.4 radio
               ; shares the RMT peripheral, causing rmt_tx_wait_all_done() timeout spam.
               ; With WLED_MAX_DIGITAL_CHANNELS=0, no RMT/I2S bus slots are created.
               ; Use analog (PWM/LEDC) outputs or a separate SPI LED controller instead.
               -DWLED_MAX_DIGITAL_CHANNELS=0
